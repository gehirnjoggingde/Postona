<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Chat bubble background -->
  <rect x="2" y="2" width="36" height="28" rx="8" fill="url(#grad1)"/>
  <!-- Chat bubble tail -->
  <path d="M10 30 L6 38 L18 32" fill="url(#grad1)"/>
  <!-- Lines inside bubble (post lines) -->
  <rect x="8" y="10" width="16" height="2.5" rx="1.25" fill="white" opacity="0.9"/>
  <rect x="8" y="16" width="22" height="2.5" rx="1.25" fill="white" opacity="0.9"/>
  <rect x="8" y="22" width="12" height="2.5" rx="1.25" fill="white" opacity="0.9"/>
  <!-- Pencil -->
  <rect x="28" y="6" width="6" height="18" rx="3" transform="rotate(35 31 15)" fill="url(#grad2)"/>
  <path d="M34 24 L30 28 L27 25 L31 21 Z" fill="url(#grad2)"/>
  <path d="M30 28 L29 31 L32 30 Z" fill="#F59E0B"/>
  <!-- LinkedIn badge -->
  <circle cx="38" cy="38" r="9" fill="#0A66C2"/>
  <text x="38" y="42" text-anchor="middle" fill="white" font-size="9" font-weight="700" font-family="Arial, sans-serif">in</text>
  <!-- Sparkle stars -->
  <circle cx="42" cy="8" r="1.5" fill="url(#grad1)" opacity="0.7"/>
  <circle cx="46" cy="14" r="1" fill="url(#grad1)" opacity="0.5"/>
  <defs>
    <linearGradient id="grad1" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
  </defs>
</svg>
